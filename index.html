<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AGOS · Студия Айгерим</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#10022;</text></svg>" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>html,body{margin:0;background:#F6F2F5;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

// ══════════════════════════════════════════════════════════════════
//  AGOS · Студия Айгерим — рабочий продукт (v3)
//  Настоящее приложение, не мокап. Адаптив: десктоп (сайдбар) + мобайл
//  (нижняя навигация). Живое расписание с проверкой конфликтов + аналитика.
// ══════════════════════════════════════════════════════════════════

const MASTERS = [
  { id: "m1", name: "Айгерим", color: "#C77B8B", off: [] },
  { id: "m2", name: "Дана", color: "#7B8BC7", off: [6] },
  { id: "m3", name: "Сабина", color: "#7BC79B", off: [5, 6] },
];

const SERVICES = [
  { id: "s1", name: "Маникюр + покрытие", price: 8000 },
  { id: "s2", name: "Снятие + маникюр", price: 10000 },
  { id: "s3", name: "Педикюр", price: 12000 },
  { id: "s4", name: "Дизайн", price: 4000 },
];

const HOURS = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00"];
const DAYS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

// живые данные недели: bookings[masterId][dayIdx][hour] = {...}
const SEED = () => ({
  m1: { 0: { "11:00": bk("Жанна", "s1", "done"), "14:00": bk("Алия", "s2", "done"), "16:00": bk("Лаура", "s1", "confirmed") },
        1: { "10:00": bk("Камила", "s1", "noshow"), "15:00": bk("Динара", "s4", "confirmed") },
        2: { "12:00": bk("Сауле", "s2", "confirmed") } },
  m2: { 0: { "10:00": bk("Мадина", "s3", "done"), "12:00": bk("Асель", "s1", "done") },
        1: { "11:00": bk("Жанель", "s1", "confirmed"), "13:00": bk("Гульнара", "s3", "noshow"), "16:00": bk("Айша", "s4", "confirmed") },
        3: { "14:00": bk("Зарина", "s2", "confirmed") } },
  m3: { 0: { "13:00": bk("Карина", "s1", "done") },
        2: { "11:00": bk("Нурлан", "s3", "confirmed"), "15:00": bk("Толкын", "s1", "confirmed") } },
});
function bk(client, service, status) { return { client, service, status }; }

const STATUS = {
  confirmed: { label: "подтверждена", c: "#7A6B74", bg: "#F4EEF1" },
  done: { label: "завершена", c: "#3A9B63", bg: "#E7F3EC" },
  noshow: { label: "не пришла", c: "#B4435A", bg: "#F7EDEF" },
  cancelled: { label: "отменена", c: "#9C8B95", bg: "#F0EAED" },
};

function App() {
  const [tab, setTab] = React.useState("dashboard");
  const [bookings, setBookings] = React.useState(SEED);
  const [modal, setModal] = React.useState(null); // {day, master, hour} | null
  const [toast, setToast] = React.useState(null);
  const [day, setDay] = React.useState(0);

  const showToast = (m, kind = "ok") => { setToast({ m, kind }); setTimeout(() => setToast(null), 2600); };

  const addBooking = (master, dIdx, hour, client, service, phone) => {
    if (bookings[master]?.[dIdx]?.[hour]) { showToast("Этот слот уже занят", "err"); return false; }
    setBookings((p) => ({ ...p, [master]: { ...p[master], [dIdx]: { ...(p[master]?.[dIdx] || {}), [hour]: { client, service, phone, status: "confirmed" } } } }));
    showToast("Запись создана");
    return true;
  };
  const setStatus = (master, dIdx, hour, status) =>
    setBookings((p) => ({ ...p, [master]: { ...p[master], [dIdx]: { ...p[master][dIdx], [hour]: { ...p[master][dIdx][hour], status } } } }));

  return (
    <div className="app">
      <style>{CSS}</style>

      {/* ─── боковая навигация (десктоп) ─── */}
      <aside className="sidebar">
        <div className="logo"><span className="logo-mark">✦</span><span className="logo-text">AGOS</span></div>
        <div className="studio-tag">Студия Айгерим</div>
        <nav className="nav">
          {[["dashboard", "◈", "Сводка"], ["schedule", "▦", "Расписание"], ["analytics", "◔", "Аналитика"], ["clients", "♔", "Клиенты"]].map(([id, ic, label]) => (
            <button key={id} className={`nav-item ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
              <span className="nav-ic">{ic}</span>{label}
            </button>
          ))}
        </nav>
        <div className="sidebar-foot">
          <div className="me"><div className="me-av">А</div><div><div className="me-name">Айгерим</div><div className="me-role">владелец</div></div></div>
        </div>
      </aside>

      {/* ─── основной контент ─── */}
      <main className="main">
        <header className="topbar">
          <div>
            <div className="eyebrow">{tab === "dashboard" ? "вторник, 30 июля" : tab === "schedule" ? "эта неделя" : tab === "analytics" ? "июль" : "база"}</div>
            <h1 className="page-title">{titleOf(tab)}</h1>
          </div>
          <button className="btn-primary" onClick={() => setModal({ day, master: "m1", hour: "" })}>+ Новая запись</button>
        </header>

        <div className="content">
          {tab === "dashboard" && <Dashboard bookings={bookings} onGo={setTab} onAdd={() => setModal({ day: 0, master: "m1", hour: "" })} />}
          {tab === "schedule" && <Schedule bookings={bookings} day={day} setDay={setDay} onCell={(m, d, h) => setModal({ day: d, master: m, hour: h })} onStatus={setStatus} />}
          {tab === "analytics" && <Analytics bookings={bookings} />}
          {tab === "clients" && <Clients bookings={bookings} />}
        </div>
      </main>

      {/* ─── нижняя навигация (мобайл) ─── */}
      <nav className="tabbar">
        {[["dashboard", "◈", "Сводка"], ["schedule", "▦", "Записи"], ["analytics", "◔", "Аналитика"], ["clients", "♔", "Клиенты"]].map(([id, ic, label]) => (
          <button key={id} className={`tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
            <span className="tab-ic">{ic}</span><span className="tab-label">{label}</span>
          </button>
        ))}
      </nav>

      {modal && <BookingModal init={modal} onClose={() => setModal(null)} onSave={addBooking} bookings={bookings} />}
      {toast && <div className={`toast ${toast.kind}`}>{toast.kind === "err" ? "⚠ " : "✓ "}{toast.m}</div>}
    </div>
  );
}

function titleOf(t) { return { dashboard: "Сводка", schedule: "Расписание", analytics: "Аналитика", clients: "Клиенты" }[t]; }

// ───────────────────────── СВОДКА ─────────────────────────
function Dashboard({ bookings, onGo, onAdd }) {
  const stats = React.useMemo(() => computeStats(bookings), [bookings]);
  const today = React.useMemo(() => {
    const rows = [];
    MASTERS.forEach((m) => {
      const d = bookings[m.id]?.[0] || {};
      Object.entries(d).forEach(([h, b]) => rows.push({ master: m, hour: h, ...b }));
    });
    return rows.sort((a, b) => a.hour.localeCompare(b.hour));
  }, [bookings]);

  return (
    <div className="dash">
      <div className="stat-grid">
        <Stat label="Записей на неделе" value={stats.total} accent="#C77B8B" hint={`${stats.confirmed} активных`} />
        <Stat label="Загрузка мастеров" value={`${stats.load}%`} accent="#7B8BC7" hint="от всех слотов" />
        <Stat label="Неявки" value={stats.noshow} accent="#B4435A" hint={`${stats.noshowRate}% записей`} />
        <Stat label="Выручка (факт)" value={`${fmt(stats.revenue)} ₸`} accent="#3A9B63" hint="за завершённые" />
      </div>

      <div className="dash-cols">
        <section className="panel">
          <div className="panel-head"><h3>Сегодня</h3><button className="link" onClick={() => onGo("schedule")}>всё расписание →</button></div>
          {today.length === 0 ? <Empty text="На сегодня записей нет" /> : (
            <div className="today-list">
              {today.map((r, i) => (
                <div key={i} className="today-row">
                  <div className="today-time">{r.hour}</div>
                  <div className="today-bar" style={{ background: r.master.color }} />
                  <div className="today-info">
                    <div className="today-client">{r.client}</div>
                    <div className="today-meta">{svcName(r.service)} · {r.master.name}</div>
                  </div>
                  <span className="status-pill" style={{ color: STATUS[r.status].c, background: STATUS[r.status].bg }}>{STATUS[r.status].label}</span>
                </div>
              ))}
            </div>
          )}
        </section>

        <section className="panel">
          <div className="panel-head"><h3>Загрузка мастеров</h3></div>
          <div className="load-list">
            {MASTERS.map((m) => {
              const pct = stats.byMaster[m.id] || 0;
              return (
                <div key={m.id} className="load-row">
                  <div className="load-name"><span className="dot" style={{ background: m.color }} />{m.name}</div>
                  <div className="load-track"><div className="load-fill" style={{ width: `${pct}%`, background: m.color }} /></div>
                  <div className="load-pct">{pct}%</div>
                </div>
              );
            })}
          </div>
          <button className="btn-soft" onClick={onAdd}>+ Добавить запись</button>
        </section>
      </div>
    </div>
  );
}

function Stat({ label, value, accent, hint }) {
  return (
    <div className="stat">
      <div className="stat-accent" style={{ background: accent }} />
      <div className="stat-label">{label}</div>
      <div className="stat-value">{value}</div>
      <div className="stat-hint">{hint}</div>
    </div>
  );
}

// ───────────────────────── РАСПИСАНИЕ ─────────────────────────
function Schedule({ bookings, day, setDay, onCell, onStatus }) {
  const [openCell, setOpenCell] = React.useState(null);
  return (
    <div className="sched">
      <div className="day-tabs">
        {DAYS.map((d, i) => (
          <button key={i} className={`day-tab ${i === day ? "on" : ""}`} onClick={() => setDay(i)}>{d}</button>
        ))}
      </div>

      <div className="grid-scroll">
        <div className="grid" style={{ gridTemplateColumns: `64px repeat(${MASTERS.length}, minmax(150px, 1fr))` }}>
          <div className="grid-corner" />
          {MASTERS.map((m) => (
            <div key={m.id} className="grid-master"><span className="dot" style={{ background: m.color }} />{m.name}</div>
          ))}

          {HOURS.map((h) => (
            <React.Fragment key={h}>
              <div className="grid-time">{h}</div>
              {MASTERS.map((m) => {
                const off = m.off.includes(day);
                const b = bookings[m.id]?.[day]?.[h];
                if (off) return <div key={m.id} className="cell off">выходной</div>;
                if (b) {
                  const open = openCell === `${m.id}-${h}`;
                  return (
                    <div key={m.id} className="cell filled" style={{ borderLeftColor: m.color }} onClick={() => setOpenCell(open ? null : `${m.id}-${h}`)}>
                      <div className="cell-client">{b.client}</div>
                      <div className="cell-svc">{svcName(b.service)}</div>
                      <span className="cell-status" style={{ color: STATUS[b.status].c, background: STATUS[b.status].bg }}>{STATUS[b.status].label}</span>
                      {open && b.status === "confirmed" && (
                        <div className="cell-actions" onClick={(e) => e.stopPropagation()}>
                          <button className="act done" onClick={() => { onStatus(m.id, day, h, "done"); setOpenCell(null); }}>Завершена</button>
                          <button className="act no" onClick={() => { onStatus(m.id, day, h, "noshow"); setOpenCell(null); }}>Не пришла</button>
                          <button className="act cancel" onClick={() => { onStatus(m.id, day, h, "cancelled"); setOpenCell(null); }}>Отменить</button>
                        </div>
                      )}
                    </div>
                  );
                }
                return <button key={m.id} className="cell empty" onClick={() => onCell(m.id, day, h)}>+</button>;
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
      <p className="hint-text">Нажми на пустой слот, чтобы добавить запись · на запись — чтобы изменить статус. Двойную запись система не даст создать.</p>
    </div>
  );
}

// ───────────────────────── АНАЛИТИКА ─────────────────────────
function Analytics({ bookings }) {
  const stats = React.useMemo(() => computeStats(bookings), [bookings]);
  const svcStats = React.useMemo(() => {
    const map = {};
    MASTERS.forEach((m) => Object.values(bookings[m.id] || {}).forEach((d) => Object.values(d).forEach((b) => {
      if (b.status === "cancelled") return;
      map[b.service] = (map[b.service] || 0) + 1;
    })));
    const max = Math.max(1, ...Object.values(map));
    return SERVICES.map((s) => ({ ...s, count: map[s.id] || 0, pct: Math.round(((map[s.id] || 0) / max) * 100) })).sort((a, b) => b.count - a.count);
  }, [bookings]);

  return (
    <div className="analytics">
      <div className="stat-grid">
        <Stat label="Записей за период" value={stats.total} accent="#C77B8B" hint="вся неделя" />
        <Stat label="Процент неявок" value={`${stats.noshowRate}%`} accent="#B4435A" hint={`${stats.noshow} из ${stats.total}`} />
        <Stat label="Средний чек" value={`${fmt(stats.avgCheck)} ₸`} accent="#7B8BC7" hint="по завершённым" />
        <Stat label="Потенциал недели" value={`${fmt(stats.potential)} ₸`} accent="#3A9B63" hint="если без неявок" />
      </div>

      <div className="dash-cols">
        <section className="panel">
          <div className="panel-head"><h3>Загрузка по мастерам</h3></div>
          <div className="load-list">
            {MASTERS.map((m) => {
              const pct = stats.byMaster[m.id] || 0;
              return (
                <div key={m.id} className="load-row">
                  <div className="load-name"><span className="dot" style={{ background: m.color }} />{m.name}</div>
                  <div className="load-track"><div className="load-fill" style={{ width: `${pct}%`, background: m.color }} /></div>
                  <div className="load-pct">{pct}%</div>
                </div>
              );
            })}
          </div>
          <p className="hint-text" style={{ marginTop: 14 }}>Сабина загружена меньше — стоит направлять онлайн-записи к ней или дать выходной кому-то другому.</p>
        </section>

        <section className="panel">
          <div className="panel-head"><h3>Популярные услуги</h3></div>
          <div className="svc-list">
            {svcStats.map((s) => (
              <div key={s.id} className="svc-row">
                <div className="svc-top"><span className="svc-name">{s.name}</span><span className="svc-count">{s.count}</span></div>
                <div className="svc-track"><div className="svc-fill" style={{ width: `${s.pct}%` }} /></div>
              </div>
            ))}
          </div>
        </section>
      </div>

      <section className="panel insight">
        <div className="insight-ic">◔</div>
        <div>
          <div className="insight-title">Что говорят цифры</div>
          <div className="insight-text">
            Неявки съедают <b>{fmt(stats.potential - stats.revenue)} ₸</b> потенциальной выручки за неделю.
            Напоминания в WhatsApp (из v2) и подтверждение визита напрямую бьют по этой цифре — это первое, что стоит включить.
          </div>
        </div>
      </section>
    </div>
  );
}

// ───────────────────────── КЛИЕНТЫ ─────────────────────────
function Clients({ bookings }) {
  const list = React.useMemo(() => {
    const map = {};
    MASTERS.forEach((m) => Object.values(bookings[m.id] || {}).forEach((d) => Object.values(d).forEach((b) => {
      if (!map[b.client]) map[b.client] = { name: b.client, visits: 0, noshow: 0 };
      map[b.client].visits++;
      if (b.status === "noshow") map[b.client].noshow++;
    })));
    return Object.values(map).sort((a, b) => b.visits - a.visits);
  }, [bookings]);

  return (
    <div className="clients">
      <div className="client-grid">
        {list.map((c, i) => (
          <div key={i} className="client-card">
            <div className="client-av">{c.name[0]}</div>
            <div className="client-info">
              <div className="client-name">{c.name}</div>
              <div className="client-meta">{c.visits} {plural(c.visits, "визит", "визита", "визитов")}{c.noshow > 0 && <span className="client-warn"> · {c.noshow} неявки</span>}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ───────────────────────── МОДАЛКА ЗАПИСИ ─────────────────────────
function BookingModal({ init, onClose, onSave, bookings }) {
  const [master, setMaster] = React.useState(init.master);
  const [day, setDay] = React.useState(init.day);
  const [hour, setHour] = React.useState(init.hour);
  const [service, setService] = React.useState("s1");
  const [name, setName] = React.useState("");
  const [phone, setPhone] = React.useState("");

  const m = MASTERS.find((x) => x.id === master);
  const off = m.off.includes(day);
  const taken = (h) => Boolean(bookings[master]?.[day]?.[h]);
  const valid = !off && hour && !taken(hour) && name.trim() && phone.trim();

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head"><h3>Новая запись</h3><button className="x" onClick={onClose}>✕</button></div>

        <div className="modal-body">
          <label className="fld">Мастер
            <div className="chips">
              {MASTERS.map((mm) => (
                <button key={mm.id} className={`chip ${master === mm.id ? "on" : ""}`} onClick={() => { setMaster(mm.id); setHour(""); }}>
                  <span className="dot" style={{ background: mm.color }} />{mm.name}
                </button>
              ))}
            </div>
          </label>

          <label className="fld">День
            <div className="chips">
              {DAYS.map((d, i) => (
                <button key={i} className={`chip sm ${day === i ? "on" : ""}`} onClick={() => { setDay(i); setHour(""); }}>{d}</button>
              ))}
            </div>
          </label>

          {off ? (
            <div className="warn">🌙 У {m.name} в этот день выходной — выбери другой день или мастера.</div>
          ) : (
            <label className="fld">Время
              <div className="time-grid">
                {HOURS.map((h) => (
                  <button key={h} disabled={taken(h)} className={`time ${hour === h ? "on" : ""} ${taken(h) ? "taken" : ""}`} onClick={() => setHour(h)}>
                    {h}{taken(h) && <span className="tk">занято</span>}
                  </button>
                ))}
              </div>
            </label>
          )}

          <label className="fld">Услуга
            <select className="select" value={service} onChange={(e) => setService(e.target.value)}>
              {SERVICES.map((s) => <option key={s.id} value={s.id}>{s.name} · {fmt(s.price)} ₸</option>)}
            </select>
          </label>

          <div className="two">
            <label className="fld">Имя<input className="inp" value={name} onChange={(e) => setName(e.target.value)} placeholder="Клиентка" /></label>
            <label className="fld">Телефон<input className="inp" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="+7" /></label>
          </div>
        </div>

        <div className="modal-foot">
          <button className="btn-soft" onClick={onClose}>Отмена</button>
          <button className={`btn-primary ${valid ? "" : "disabled"}`} disabled={!valid}
            onClick={() => { if (onSave(master, day, hour, name, service, phone)) onClose(); }}>Создать запись</button>
        </div>
      </div>
    </div>
  );
}

// ───────────────────────── helpers ─────────────────────────
function computeStats(bookings) {
  let total = 0, confirmed = 0, done = 0, noshow = 0, revenue = 0, potential = 0;
  const byMasterCount = {};
  const slotsPerMaster = HOURS.length * 6; // 6 рабочих дней грубо
  MASTERS.forEach((m) => {
    let cnt = 0;
    Object.values(bookings[m.id] || {}).forEach((d) => Object.values(d).forEach((b) => {
      if (b.status === "cancelled") return;
      total++; cnt++;
      const price = SERVICES.find((s) => s.id === b.service)?.price || 0;
      potential += price;
      if (b.status === "confirmed") confirmed++;
      if (b.status === "done") { done++; revenue += price; }
      if (b.status === "noshow") noshow++;
    }));
    byMasterCount[m.id] = cnt;
  });
  const byMaster = {};
  MASTERS.forEach((m) => { byMaster[m.id] = Math.round((byMasterCount[m.id] / slotsPerMaster) * 100); });
  const load = Math.round((total / (slotsPerMaster * MASTERS.length)) * 100);
  return {
    total, confirmed, done, noshow, revenue, potential,
    noshowRate: total ? Math.round((noshow / total) * 100) : 0,
    avgCheck: done ? Math.round(revenue / done) : 0,
    load, byMaster,
  };
}
const svcName = (id) => SERVICES.find((s) => s.id === id)?.name || id;
const fmt = (n) => n.toLocaleString("ru-RU");
function plural(n, one, few, many) { const a = n % 10, b = n % 100; if (a === 1 && b !== 11) return one; if (a >= 2 && a <= 4 && (b < 10 || b >= 20)) return few; return many; }
function Empty({ text }) { return <div className="empty-state">{text}</div>; }

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
.app { font-family: 'Manrope', system-ui, sans-serif; background: #F6F2F5; color: #2E2A33; min-height: 100vh; display: flex; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
.dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

/* sidebar */
.sidebar { width: 230px; background: #fff; border-right: 1px solid #EFE7EC; padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
.logo { display: flex; align-items: center; gap: 9px; padding: 0 8px; }
.logo-mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg,#C77B8B,#9B6FA8); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.logo-text { font-size: 19px; font-weight: 800; letter-spacing: 1px; }
.studio-tag { font-size: 12px; color: #B49AA6; padding: 4px 8px 0 8px; margin-bottom: 24px; }
.nav { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 11px; font-size: 14.5px; font-weight: 600; color: #7A6B74; text-align: left; transition: .15s; }
.nav-item:hover { background: #F8F2F5; }
.nav-item.on { background: #2E2A33; color: #fff; }
.nav-ic { font-size: 15px; width: 18px; text-align: center; }
.sidebar-foot { border-top: 1px solid #EFE7EC; padding-top: 16px; }
.me { display: flex; align-items: center; gap: 10px; }
.me-av { width: 36px; height: 36px; border-radius: 50%; background: #C77B8B; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; }
.me-name { font-size: 14px; font-weight: 700; } .me-role { font-size: 12px; color: #9C8B95; }

/* main */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { display: flex; justify-content: space-between; align-items: flex-end; padding: 26px 32px 18px; }
.eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #B49AA6; font-weight: 700; }
.page-title { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; margin-top: 3px; }
.content { padding: 0 32px 40px; }
.btn-primary { background: #2E2A33; color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; transition: .15s; }
.btn-primary:hover { background: #443d4b; }
.btn-primary.disabled { background: #E0D7DC; cursor: not-allowed; }
.btn-soft { background: #F0E9ED; color: #7A6B74; padding: 12px 18px; border-radius: 12px; font-size: 14px; font-weight: 700; }
.btn-soft:hover { background: #E8DFE5; }
.link { font-size: 13px; color: #9B6FA8; font-weight: 700; }

/* stats */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
.stat { background: #fff; border: 1px solid #EFE7EC; border-radius: 18px; padding: 18px 20px; position: relative; overflow: hidden; }
.stat-accent { position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
.stat-label { font-size: 12.5px; color: #9C8B95; font-weight: 600; }
.stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 6px 0 2px; }
.stat-hint { font-size: 12px; color: #B49AA6; }

/* dash cols */
.dash-cols { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
.panel { background: #fff; border: 1px solid #EFE7EC; border-radius: 18px; padding: 20px 22px; }
.panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.panel-head h3 { font-size: 16px; font-weight: 800; }

/* today */
.today-list { display: flex; flex-direction: column; gap: 8px; }
.today-row { display: flex; align-items: center; gap: 12px; }
.today-time { width: 44px; font-size: 13px; font-weight: 700; color: #B49AA6; }
.today-bar { width: 3px; align-self: stretch; border-radius: 3px; min-height: 36px; }
.today-info { flex: 1; }
.today-client { font-size: 14.5px; font-weight: 700; }
.today-meta { font-size: 12.5px; color: #9C8B95; margin-top: 1px; }
.status-pill { font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 7px; white-space: nowrap; }

/* load */
.load-list { display: flex; flex-direction: column; gap: 14px; }
.load-row { display: flex; align-items: center; gap: 12px; }
.load-name { display: flex; align-items: center; gap: 8px; width: 92px; font-size: 13.5px; font-weight: 600; }
.load-track { flex: 1; height: 9px; background: #F2EBEF; border-radius: 6px; overflow: hidden; }
.load-fill { height: 100%; border-radius: 6px; transition: width .5s; }
.load-pct { width: 38px; text-align: right; font-size: 13px; font-weight: 800; color: #7A6B74; }

/* schedule */
.day-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.day-tab { padding: 9px 16px; border-radius: 11px; font-size: 14px; font-weight: 700; color: #7A6B74; background: #fff; border: 1px solid #EFE7EC; }
.day-tab.on { background: #2E2A33; color: #fff; border-color: #2E2A33; }
.grid-scroll { overflow-x: auto; border-radius: 16px; border: 1px solid #EFE7EC; background: #fff; }
.grid { display: grid; min-width: 540px; }
.grid-corner { background: #FAF6F8; border-bottom: 1px solid #EFE7EC; }
.grid-master { padding: 14px 12px; font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 7px; background: #FAF6F8; border-bottom: 1px solid #EFE7EC; border-left: 1px solid #F4EEF1; }
.grid-time { padding: 14px 10px; font-size: 12.5px; font-weight: 700; color: #B49AA6; border-bottom: 1px solid #F4EEF1; }
.cell { border-bottom: 1px solid #F4EEF1; border-left: 1px solid #F4EEF1; padding: 8px; min-height: 62px; position: relative; }
.cell.empty { color: #D8CCD2; font-size: 18px; font-weight: 400; transition: .12s; }
.cell.empty:hover { background: #FCF5F7; color: #C77B8B; }
.cell.off { background: #FAF8F9; color: #C7B9C0; font-size: 11.5px; display: flex; align-items: center; justify-content: center; }
.cell.filled { background: #fff; border-left: 3px solid; cursor: pointer; }
.cell.filled:hover { background: #FCFAFB; }
.cell-client { font-size: 13.5px; font-weight: 700; }
.cell-svc { font-size: 11.5px; color: #9C8B95; margin: 2px 0 5px; }
.cell-status { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
.cell-actions { position: absolute; z-index: 5; top: 100%; left: 6px; right: 6px; background: #fff; border: 1px solid #EFE7EC; border-radius: 11px; box-shadow: 0 10px 30px rgba(80,50,70,.16); padding: 6px; display: flex; flex-direction: column; gap: 4px; }
.act { padding: 8px; border-radius: 8px; font-size: 12.5px; font-weight: 700; text-align: left; }
.act.done { background: #E7F3EC; color: #3A9B63; } .act.no { background: #F7EDEF; color: #B4435A; } .act.cancel { background: #F0EAED; color: #9C8B95; }
.hint-text { font-size: 12.5px; color: #9C8B95; margin-top: 12px; line-height: 1.5; }

/* svc analytics */
.svc-list { display: flex; flex-direction: column; gap: 13px; }
.svc-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
.svc-name { font-size: 13.5px; font-weight: 600; } .svc-count { font-size: 13px; font-weight: 800; color: #7A6B74; }
.svc-track { height: 8px; background: #F2EBEF; border-radius: 6px; overflow: hidden; }
.svc-fill { height: 100%; background: linear-gradient(90deg,#C77B8B,#9B6FA8); border-radius: 6px; transition: width .5s; }
.insight { display: flex; gap: 16px; align-items: flex-start; margin-top: 16px; background: linear-gradient(135deg,#FCF5F7,#F4EEF8); }
.insight-ic { font-size: 26px; color: #9B6FA8; }
.insight-title { font-size: 15px; font-weight: 800; margin-bottom: 5px; }
.insight-text { font-size: 14px; color: #6B5C64; line-height: 1.6; }

/* clients */
.client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.client-card { background: #fff; border: 1px solid #EFE7EC; border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 13px; }
.client-av { width: 44px; height: 44px; border-radius: 50%; background: #F0E4E9; color: #C77B8B; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; }
.client-name { font-size: 15px; font-weight: 700; } .client-meta { font-size: 12.5px; color: #9C8B95; margin-top: 2px; }
.client-warn { color: #B4435A; font-weight: 600; }

.empty-state { padding: 30px; text-align: center; color: #B49AA6; font-size: 14px; }

/* modal */
.overlay { position: fixed; inset: 0; background: rgba(46,42,51,.45); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.modal { background: #fff; border-radius: 22px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; padding: 22px 24px 14px; }
.modal-head h3 { font-size: 19px; font-weight: 800; }
.x { font-size: 18px; color: #B49AA6; width: 32px; height: 32px; border-radius: 9px; }
.x:hover { background: #F4EEF1; }
.modal-body { padding: 0 24px; display: flex; flex-direction: column; gap: 16px; }
.fld { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: #B49AA6; font-weight: 700; display: flex; flex-direction: column; gap: 9px; }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip { display: flex; align-items: center; gap: 6px; padding: 9px 13px; border-radius: 11px; border: 1.5px solid #F0E9ED; background: #fff; font-size: 13px; font-weight: 700; color: #2E2A33; text-transform: none; letter-spacing: 0; }
.chip.sm { padding: 9px 14px; }
.chip.on { border-color: #C77B8B; background: #FCF5F7; }
.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.time { padding: 11px 0; border-radius: 10px; border: 1.5px solid #F0E9ED; background: #fff; font-size: 13px; font-weight: 700; color: #2E2A33; text-transform: none; letter-spacing: 0; }
.time.on { border-color: #C77B8B; background: #C77B8B; color: #fff; }
.time.taken { background: #F4EFF1; color: #CDBFC6; border-style: dashed; cursor: not-allowed; }
.tk { display: block; font-size: 8px; font-weight: 600; margin-top: 1px; }
.select, .inp { width: 100%; border: 1.5px solid #F0E9ED; border-radius: 11px; padding: 12px 13px; font-size: 14.5px; font-family: inherit; color: #2E2A33; outline: none; text-transform: none; letter-spacing: 0; font-weight: 600; background: #fff; }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.warn { background: #FCF3E8; border: 1px solid #F0DEC2; border-radius: 12px; padding: 13px 15px; font-size: 13.5px; color: #9A7330; font-weight: 600; text-transform: none; letter-spacing: 0; }
.modal-foot { display: flex; gap: 10px; padding: 18px 24px 22px; }
.modal-foot .btn-primary, .modal-foot .btn-soft { flex: 1; }

/* toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); color: #fff; padding: 13px 22px; border-radius: 13px; font-size: 14px; font-weight: 600; box-shadow: 0 12px 32px rgba(0,0,0,.25); z-index: 99; background: #2E2A33; }
.toast.err { background: #B4435A; }

/* tabbar (mobile) hidden on desktop */
.tabbar { display: none; }

/* ───────── RESPONSIVE ───────── */
@media (max-width: 900px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-cols { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .app { display: block; padding-bottom: 72px; }
  .sidebar { display: none; }
  .topbar { padding: 20px 18px 14px; flex-direction: column; align-items: flex-start; gap: 14px; }
  .topbar .btn-primary { width: 100%; }
  .content { padding: 0 16px 30px; }
  .page-title { font-size: 23px; }
  .stat-value { font-size: 24px; }
  .two { grid-template-columns: 1fr; }
  .tabbar { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #EFE7EC; padding: 8px 6px calc(8px + env(safe-area-inset-bottom)); z-index: 40; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; color: #9C8B95; }
  .tab.on { color: #2E2A33; }
  .tab-ic { font-size: 18px; }
  .tab-label { font-size: 10.5px; font-weight: 700; }
}
@media (max-width: 420px) {
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { padding: 14px 15px; }
}
`;

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
